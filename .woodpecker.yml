# Woodpecker CI configuration for catalog-web
# Deploys the site to Cloudflare Workers

steps:
  build:
    image: ghcr.io/eissar/catalog-web-builder:latest
    commands:
      - deno task build

  validate:
    image: ghcr.io/eissar/catalog-web-builder:latest
    commands:
      - |
        catalog_files=$(find _site -path "*/catalog/*.html")
        if [ -z "$catalog_files" ]; then
          echo "ERROR: No catalog files found in build output!"
          exit 1
        fi
        echo "✓ Catalog files found"

  deploy:
    image: ghcr.io/eissar/catalog-web-builder:latest
    environment:
      CLOUDFLARE_API_TOKEN:
        from_secret: cloudflare_api_token
    commands:
      - npx wrangler deploy _site --name=catalog-web

when:
  - event: [push, manual]
    branch: master
